name: Build Release Image
on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        description: Tag to build for
  push:
    tags:
      - '*'

jobs:
  prepare:
    name: Select the tag to build for and create Draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Set tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag=$(basename "${{ github.ref }}")
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
      - name: Create GitHub Draft Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          body="Pre-release for @${{ steps.tag.outputs.tag }}"
          gh release create --draft "$tag" --title "$tag-pre" --notes "$body"

  build_2024:
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          submodules: 'recursive'
      - name: Load versions
        run: cat boards/shared/images.env >> ${GITHUB_ENV}
      - name: Prepare images
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p boards/2024/build
          cd boards/2024/build
          sudo chown -R $(whoami) .
          gh release download ${MICROPYTHONOS_VERSION} -R MicroPythonOS/MicroPythonOS
          gh release download ${RETRO_GO_VERSION} -R ThomasFarstrike/retro-go
          mv MicroPythonOS_esp32s3_*.bin MicroPythonOS_esp32s3.bin
          mv MicroPythonOS_esp32s3_*.ota MicroPythonOS_esp32s3.ota
          echo "Extract bootloader"
          dd if=MicroPythonOS_esp32s3.bin of=bootloader.bin bs=1 count=32768
          hexdump -C test.bin | head
          truncate -s -3 littlefs2.bin
      - name: Build full images
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.2
          target: esp32s3
          path: 'boards/2024/build'
          command: gen_esp32part.py --flash-size 16MB ../../shared/partitions.16mb.csv > partitions.16mb.bin && zip -j full_webflasher_2024.zip ../flash_args MicroPythonOS_esp32s3.ota bootloader.bin partitions.16mb.bin retro_go_core_2024.bin retro_go_duke3d_2024.bin retro_go_prboom_2024.bin littlefs2.bin && esptool.py $(sed "s/write_flash/merge_bin -o full_2024.img/g" ../flash_args | sed "s/ --baud 460800//g")
      - name: Upload binaries to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd boards/2024/build
          gh release upload "${{ needs.prepare.outputs.tag }}" \
            "full_2024.img" \
            "full_webflasher_2024.zip"

  build_2026:
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          submodules: 'recursive'
      - name: Load versions
        run: cat boards/shared/images.env >> ${GITHUB_ENV}
      - name: Prepare images
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p boards/2026/build
          cd boards/2026/build
          sudo chown -R $(whoami) .
          gh release download ${MICROPYTHONOS_VERSION} -R MicroPythonOS/MicroPythonOS
          gh release download ${RETRO_GO_VERSION} -R ThomasFarstrike/retro-go
          mv MicroPythonOS_esp32s3_*.bin MicroPythonOS_esp32s3.bin
          mv MicroPythonOS_esp32s3_*.ota MicroPythonOS_esp32s3.ota
          echo "Extract bootloader"
          dd if=MicroPythonOS_esp32s3.bin of=bootloader.bin bs=1 count=32768
          hexdump -C test.bin | head
          truncate -s -3 littlefs2.bin
      - name: Build full images
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.2
          target: esp32s3
          path: 'boards/2026/build'
          command: gen_esp32part.py --flash-size 16MB ../../shared/partitions.16mb.csv > partitions.16mb.bin && zip -j full_webflasher_2026.zip ../flash_args MicroPythonOS_esp32s3.ota bootloader.bin partitions.16mb.bin retro_go_core_2026.bin retro_go_duke3d_2026.bin retro_go_prboom_2026.bin littlefs2.bin && esptool.py $(sed "s/write_flash/merge_bin -o full_2026.img/g" ../flash_args | sed "s/ --baud 460800//g")
      - name: Upload binaries to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd boards/2026/build
          gh release upload "${{ needs.prepare.outputs.tag }}" \
            "full_2026.img" \
            "full_webflasher_2026.zip"



